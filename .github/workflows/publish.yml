name: Build & Publish to PyPI

# Trigger on GitHub Release (recommended) or manual dispatch
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  # ── Build compiled wheels for all targets ──────────────────────────────
  build-wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21
        env:
          # Python versions to build for
          CIBW_BUILD: "cp39-* cp310-* cp311-* cp312-*"

          # Skip 32-bit builds and musl (Alpine) — not common for scientific Python
          CIBW_SKIP: "*-win32 *-manylinux_i686 *-musllinux_*"

          # Show full build output so Cython errors are visible
          CIBW_BUILD_VERBOSITY: "1"

          # Skip in-CI test — installing torch (~2GB) causes flaky timeouts.
          # cibuildwheel already rejects pure-Python wheels, which validates
          # that Cython compilation succeeded and .so/.pyd files exist.

          # macOS: Apple Silicon on macos-14 (macos-13 deprecated by GitHub)
          CIBW_ARCHS_MACOS: "native"

          # Linux: x86_64 only (add aarch64 later if needed)
          CIBW_ARCHS_LINUX: "x86_64"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  # ── Build source distribution (fallback for unsupported platforms) ─────
  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        run: pipx run build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  # ── Upload everything to PyPI ──────────────────────────────────────────
  publish:
    name: Publish to PyPI
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # Required for trusted publishing

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: List artifacts
        run: ls -lh dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
